[build]
  command = "npm install"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/swap-shop"
  to = "/swap-shop.html"
  status = 200

[[redirects]]
  from = "/race-league"
  to = "/race-league/index.html"
  status = 200

[[redirects]]
  from = "/volunteers"
  to = "/volunteers/index.html"
  status = 200

[[redirects]]
  from = "/api/volunteers/*"
  to = "/.netlify/functions/:splat"
  status = 200
